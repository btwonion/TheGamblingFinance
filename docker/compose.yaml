# Docker Compose — Phase 0 local stack.
#
# Four services:
#   - db      : Postgres 16, persistent named volume.
#   - migrate : one-shot job that applies migrations via psql.
#               Uses the postgres:16-alpine image (which already ships
#               with psql) instead of baking sqlx-cli into the API
#               image — keeps the runtime lean. DevOps can swap to
#               `cargo install sqlx-cli` in Phase 2 if needed.
#   - api     : the Rust backend; waits for migrate to exit 0.
#   - web     : static frontend served by nginx on :5173.
#
# Run from repo root:
#     docker compose -f docker/compose.yaml up --build
#
# Compose reads `.env` at the repo root by default (see ../.env.example).

name: gamblingfinance

x-db-env: &db-env
  POSTGRES_DB:       ${POSTGRES_DB:-gamblingfinance}
  POSTGRES_USER:     ${POSTGRES_USER:-gamblingfinance}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-in-prod}

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      <<: *db-env
    volumes:
      - pgdata:/var/lib/postgresql/data
    # Port-forward optional; comment out in prod.
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 3s
      timeout: 3s
      retries: 20

  # One-shot: apply every SQL file in /migrations (sorted), then exit.
  # The API service gates on `service_completed_successfully` so it
  # never boots against an un-migrated DB.
  migrate:
    image: postgres:16-alpine
    depends_on:
      db:
        condition: service_healthy
    environment:
      <<: *db-env
    volumes:
      - ../migrations:/migrations:ro
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -euo pipefail
        echo "Applying migrations from /migrations..."
        for f in $$(ls /migrations/*.sql | sort); do
          echo "  $$f"
          PGPASSWORD=$$POSTGRES_PASSWORD psql \
            -h db -U "$$POSTGRES_USER" -d "$$POSTGRES_DB" \
            -v ON_ERROR_STOP=1 -f "$$f"
        done
        echo "Migrations complete."

  api:
    build:
      context: ..
      dockerfile: docker/backend.Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL:   ${DATABASE_URL:-postgres://gamblingfinance:change-me-in-prod@db:5432/gamblingfinance}
      PORT:           "8080"
      SESSION_SECRET: ${SESSION_SECRET:-replace-with-32-byte-random-hex}
      RUST_LOG:       ${RUST_LOG:-info,gamblingfinance=debug,tower_http=info}
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/health >/dev/null || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5

  web:
    build:
      context: ..
      dockerfile: docker/frontend.Dockerfile
    restart: unless-stopped
    depends_on:
      api:
        condition: service_started
    ports:
      - "5173:80"

volumes:
  pgdata:
    name: gamblingfinance_pgdata
